<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vibration Safari test
  </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
    }

    button {
      font-size: 18px;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    /* tiny invisible interactive element */
    #haptic-proxy {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<button id="btn">Tap me</button>

<!-- proxy element -->
<input id="haptic-proxy" type="checkbox" switch>

<script>
const hapticEl = document.getElementById("haptic-proxy");

function triggerHaptic(e) {
  // --- iOS Safari attempts ---

  try {
    // 1. Force state change (important)
    hapticEl.checked = !hapticEl.checked;

    // 2. Temporarily allow interaction + move under finger
    if (e && e.touches && e.touches[0]) {
      const touch = e.touches[0];
      hapticEl.style.left = touch.clientX + "px";
      hapticEl.style.top = touch.clientY + "px";
    } else if (e) {
      hapticEl.style.left = e.clientX + "px";
      hapticEl.style.top = e.clientY + "px";
    }

    hapticEl.style.pointerEvents = "auto";

    // 3. Trigger click
    hapticEl.click();

    // 4. Reset
    hapticEl.style.pointerEvents = "none";

  } catch (err) {
    // ignore
  }

  // --- Android / supported browsers ---
  if (navigator.vibrate) {
    navigator.vibrate(10);
  }
}

// Use BOTH touch and click for better coverage
const btn = document.getElementById("btn");

btn.addEventListener("touchstart", triggerHaptic, { passive: true });
btn.addEventListener("click", triggerHaptic);
</script>

</body>
</html>
